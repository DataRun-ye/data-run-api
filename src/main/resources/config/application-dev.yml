logging:
  level:
    org:
      springframework:
        security:
          web:
            FilterChainProxy=TRACE:
    ROOT: INFO
    org.springframework.batch: INFO
    tech.jhipster: DEBUG
    org.nmcpye.datarun: DEBUG

spring:
  devtools:
    restart:
      enabled: false
      additional-exclude: static/**
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  data:
    mongodb:
      uri: mongodb://dRunUser:dRunUser@localhost:27017/dataRunApi
      auto-index-creation: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/dataRunApiStages
    username: dataRunApi
    password: dataRunApi

    hikari:
      poolName: Hikari
      auto-commit: false
  liquibase:
    contexts: dev
  jooq:
    sql-dialect: postgres
  mail:
    host: localhost
    port: 25
    username:
    password:
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false
server:
  port: 8080
  forward-headers-strategy: native

datarun:
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: MjJmNDA2ZjQwMzg5NWE0ZDFiZmZmY2IzYzk2NmQ0MmI4OTM0NWU1MDBjYmU1N2VkYmNjOWM2ZmI2OGVlZWVmYTI0NDM0Y2JhY2ZhMWI2Nzg2ZGY2YWNhZjNmMTViYTcyZTNmMjMwNmFjZTRkMTAzOTVhYjlkNDRhOWZhNDJhY2I=
