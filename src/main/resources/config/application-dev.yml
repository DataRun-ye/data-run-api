server:
  port: 8080
  # From the jhipster new upgrade
  # make sure requests the proxy uri instead of the server one
#  forward-headers-strategy: native

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================
datarun:
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: MjJmNDA2ZjQwMzg5NWE0ZDFiZmZmY2IzYzk2NmQ0MmI4OTM0NWU1MDBjYmU1N2VkYmNjOWM2ZmI2OGVlZWVmYTI0NDM0Y2JhY2ZhMWI2Nzg2ZGY2YWNhZjNmMTViYTcyZTNmMjMwNmFjZTRkMTAzOTVhYjlkNDRhOWZhNDJhY2I=
        #        token-validity-in-seconds: 900 # Token is valid 15 minutes
        token-validity-in-seconds: 86400 # Token is valid 24 hours
        refresh-token-validity-in-seconds: 2592000 # 30 days
        token-validity-in-seconds-for-remember-me: 2592000
outbox:
  relay:
    poll-interval-ms: 2000   # polling delay between polls (ms)
    batch-size: 20           # how many to claim per poll
    worker-threads: 8        # number of concurrent worker threads
    max-attempts: 5
    visibility-timeout-seconds: 600   # reclaim if processing_started older than this
    reclaim-interval-ms: 60000
backoff:
  base-seconds: 30
  jitter-seconds: 5
  max-seconds: 3600


pilot:
  repeat:
    uids: RPT_aaf9a7ade8ad8535,RPT_0cb69bd7ed22c6d5
  page:
    size: 500
  run:
    backfill: true
    projection: true

# from mongo, do we run or not, comment all if not
migration:
  mongo:
    collection: data_form_submission
  chunk:
    size: 150
  page:
    size: 100
  run: true
  auto-start: true

  size: 300
  cron: "0 */1 * * * *"
  generate-missing-ids: true
  submissionUids: Eelt7ZePvz0, LaGeMmmCEtH, QIMwgBqVsqW, zglED4TsbTh, M3fdtzBSpn8, RQlMiMcukid, gGyX1CVnOaw, YLcsWJlB7uy, hcLU8ZtUdSd, Ls9TW9eSlYH, ck2pHW93sk2, rkwH5QNofRn, KcsA3KETRbY, woOl5yAmi8C, BoEmHvJUEpb,W8EtCDYfp1w, MrxGOZ6stwS, UYBPOIfCU0a, mpmjpJcMuas, IP2dMtoJkO4, ONIaOpzoYAe
  runOutboxBackfill: true

jhipster:
  client-app:
    name: "datarun"
  cache: # Cache configuration
    ehcache: # Ehcache configuration
      time-to-live-seconds: 3600 # By default objects stay 1 hour in the cache
      max-entries: 200 # Number of objects in each cache entry
  # CORS is only enabled by default with the "dev" profile
  cors:
    # Allow Ionic for JHipster by default (* no longer allowed in Spring Boot 2.4+)
    allowed-origins: 'http://localhost:8100,https://localhost:8100,http://localhost:9000,https://localhost:9000'
    # Enable CORS when running in GitHub Codespaces
    allowed-origin-patterns: 'https://*.githubpreview.dev'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: MjJmNDA2ZjQwMzg5NWE0ZDFiZmZmY2IzYzk2NmQ0MmI4OTM0NWU1MDBjYmU1N2VkYmNjOWM2ZmI2OGVlZWVmYTI0NDM0Y2JhY2ZhMWI2Nzg2ZGY2YWNhZjNmMTViYTcyZTNmMjMwNmFjZTRkMTAzOTVhYjlkNDRhOWZhNDJhY2I=
        # Token is valid 24 hours
        token-validity-in-seconds: 86400 # Token is valid 24 hours
        #        token-validity-in-seconds: 900 # Token is valid 15 minutes
        token-validity-in-seconds-for-remember-me: 2592000

  mail: # specific JHipster mail property, for standard properties see MailProperties
    base-url: http://127.0.0.1:8080
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
