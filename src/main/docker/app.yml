# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: datarunapi
services:
  app:
    image: kaswarah/datarunapi:latest
    container_name: datarunapi
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
      - SPRING_DATASOURCE_USERNAME=dRunUser
      - SPRING_DATASOURCE_PASSWORD=dRunUser
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/dRunDb
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgresql:5432/dRunDb
      - SPRING_DATA_MONGODB_USERNAME=dRunUser
      - SPRING_DATA_MONGODB_PASSWORD=dRunUser
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dRunMongoDb
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
#    volumes:
#      - ../../target/data-run-api-0.0.1-SNAPSHOT.jar:/app/data-run-api-0.0.1-SNAPSHOT.jar
#    command: ["java", "-jar", "/app/data-run-api-0.0.1-SNAPSHOT.jar"]
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8081/management/health
      interval: 5s
      timeout: 5s
      retries: 40
    depends_on:
      postgresql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - nmcp-network
  postgresql:
    extends:
      file: ./postgresql.yml
      service: postgresql
  mongodb:
    extends:
      file: ./mongodb.yml
      service: mongodb
  consul:
    extends:
      file: ./consul.yml
      service: consul
  consul-config-loader:
    extends:
      file: ./consul.yml
      service: consul-config-loader
