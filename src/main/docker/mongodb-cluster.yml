name: datarunapi
services:
  mongodb:
    image: mongo:7.0.6
    ports:
      - 27017:27017
    command: mongos --configdb csvr/datarunapi-mongodb-config --bind_ip 0.0.0.0
  mongodb-node:
    build:
      context: .
      dockerfile: mongodb/MongoDB.Dockerfile
    command: mongod --shardsvr --replSet rs1
  mongodb-config:
    image: mongo:7.0.6
    container_name: datarunapi-mongodb-config
    command: mongod --configsvr --dbpath /data/db --replSet csvr
