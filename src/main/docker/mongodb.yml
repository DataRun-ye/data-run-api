name: datarunapi
services:
  mongodb:
    image: mongo:7.0.6
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=dRunUser
      - MONGO_INITDB_ROOT_PASSWORD=dRunUser
    ports:
      - 27017:27017
#    volumes:
#      - mongodb_data:/data/db/
    healthcheck:
      test:
        - CMD-SHELL
        - echo 'db.runCommand("ping").ok' | mongo localhost:27017/test -u dRunUser -p dRunUser --authenticationDatabase admin --quiet
      interval: 5s
      timeout: 5s
      retries: 10
