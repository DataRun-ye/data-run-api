openapi: "3.1.0"
info:
  title: "data_run_api API"
  description: "data_run_api API"
  version: "1.0.0"
servers:
  - url: "https://data_run_api"
paths:
  /api/v1/analytics/pivot/metadata:
    get:
      summary: "GET api/v1/analytics/pivot/metadata"
      operationId: "metadata"
      parameters:
        - name: "templateId"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "templateVersionId"
          in: "query"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
  /api/v1/analytics/pivot/query:
    post:
      summary: "POST api/v1/analytics/pivot/query"
      operationId: "query"
      parameters:
        - name: "format"
          in: "query"
          required: false
          schema:
            type: "string"
            enum:
              - "TABLE_ROWS"
              - "PIVOT_MATRIX"
            default: "TABLE_ROWS"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PivotQueryRequest"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PivotQueryResponse"
  /api/v1/analytics/pivot/field:
    get:
      summary: "GET api/v1/analytics/pivot/field"
      operationId: "resolveField"
      parameters:
        - name: "id"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "templateId"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "templateVersionId"
          in: "query"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
components:
  schemas:
    MeasureRequest:
      type: "object"
      required:
        - elementIdOrUid
        - aggregation
      properties:
        elementIdOrUid:
          type: "string"
          description: "Either 'etc:<uid>' for template scoped field or 'de:<uid>' for global data element or plain uid."
          example: "etc:KiHwmLKUo9j"
        aggregation:
          type: "string"
          description: "Aggregation mode. e.g. SUM, AVG, MIN, MAX, COUNT, COUNT_DISTINCT, SUM_TRUE"
          example: "SUM"
        alias:
          type: "string"
          description: "Optional alias for the resulting column."
          example: "total_population"
        distinct:
          type: "boolean"
          description: "Optional: if true, COUNT(DISTINCT ...)"
          example: false
        optionId:
          type: "string"
          nullable: true
          description: "Optional option uid (if a measure refers to a specific option)."
          example: null
    Object:
      type: "object"
      description: "Value for the filter. Type depends on the field. For IN use an array."
      oneOf:
        - type: array
          items: { }
        - type: string
        - type: number
        - type: boolean
      example: [ "A0zx1Phnfua", "Cf76XBVwfZS" ]
      properties: { }
    FilterDto:
      type: "object"
      required:
        - field
        - op
        - value
      properties:
        field:
          type: "string"
          description: "Field name or alias. e.g. 'team_uid', 'etc:KiH...' or measure alias"
          example: "team_uid"
        op:
          type: "string"
          description: "Operator: =, !=, <, >, <=, >=, IN, LIKE, ILIKE"
          example: "IN"
        value:
          $ref: "#/components/schemas/Object"
    SortDto:
      type: "object"
      required:
        - fieldOrAlias
      properties:
        fieldOrAlias:
          type: "string"
          description: "Dimension name or measure alias to sort by"
          example: "total_population"
        desc:
          type: "boolean"
          description: "true = descending, false = ascending"
          example: true
    PivotQueryRequest:
      type: "object"
      required:
        - templateId
        - templateVersionId
      properties:
        templateId:
          type: "string"
          description: "Template UID (11 char business uid)."
          example: "Tcf3Ks9ZRpB"
        templateVersionId:
          type: "string"
          description: "Template version UID."
          example: "fb2GC7FInSu"
        dimensions:
          type: "array"
          items:
            type: "string"
          description: "Backwards-compatible: list of dimension column names (e.g. team_uid, etc_uid)."
          example: [ "team_uid" ]
        rowDimensions:
          type: "array"
          items:
            type: "string"
          description: "(Optional) explicit row dimensions for PIVOT_MATRIX."
        columnDimensions:
          type: "array"
          items:
            type: "string"
          description: "(Optional) explicit column dimensions for PIVOT_MATRIX."
        measures:
          type: "array"
          items:
            $ref: "#/components/schemas/MeasureRequest"
          description: "List of measures to compute."
        filters:
          type: "array"
          items:
            $ref: "#/components/schemas/FilterDto"
          description: "Filters applied to facts or aliases."
        from:
          type: "string"
          format: "date-time"
          nullable: true
          description: "Start (inclusive) for submission_completed_at"
        to:
          type: "string"
          format: "date-time"
          nullable: true
        sorts:
          type: "array"
          items:
            $ref: "#/components/schemas/SortDto"
        limit:
          type: "integer"
          format: "int32"
          example: 100
          default: 100
        offset:
          type: "integer"
          format: "int32"
          example: 0
          default: 0
        autoRenameAliases:
          type: "boolean"
          example: false
          description: "If true, duplicate aliases will be auto-renamed by the server."
        tolerantOrdering:
          type: "boolean"
        allowedTeamUids:
          type: "array"
          items:
            type: "string"
          nullable: true
    ColumnDto:
      type: "object"
      properties:
        id:
          type: "string"
          description: "Column id (alias or fact column)."
        label:
          type: "string"
        dataType:
          type: "string"
        extras:
          type: "string"
    Map:
      type: "object"
      properties: { }
    PivotMatrixDto:
      type: "object"
      properties:
        rowDimensionNames:
          type: "array"
          items:
            type: "string"
        columnDimensionNames:
          type: "array"
          items:
            type: "string"
        measureAliases:
          type: "array"
          items:
            type: "string"
        rowHeaders:
          type: "array"
          items:
            type: "array"
        columnHeaders:
          type: "array"
          items:
            type: "array"
        cells:
          type: "array"
          items:
            type: "array"
    PivotQueryResponse:
      type: "object"
      properties:
        total:
          type: "integer"
          format: "int64"
          description: "Total number of groups (if grouping) or 1 for global aggregate."
        meta:
          type: "string"
        columns:
          type: "array"
          items:
            $ref: "#/components/schemas/ColumnDto"
        rows:
          type: "array"
          items:
            $ref: "#/components/schemas/Map"
          description: "Rows as maps columnId -> value."
        matrix:
          $ref: "#/components/schemas/PivotMatrixDto"
